# sne e cmb
stop_at_error: false
debug: false
timing: true
output: /share/storage3/bets/camilo_storage3/cmb_gamma/chains/MCMC20 #./projects/cmb_gamma/chains/MCMC10

likelihood:
  planck_2018_lowl.TT:
    path: ./external_modules
  planck_2020_hillipop.TTTEEE:
    data_folder: planck/hillipop
  planck_2020_lollipop.lowlE:
    data_folder: planck/lollipop
  planck_2018_lensing.clik:
    path: ./external_modules
  PP_semSH0ES:

theory:
  camb:
    path: ./external_modules/code/CAMB_GammaPrime_Growth
    ignore_obsolete: True
    use_renames: True
    extra_args:
      AccuracyBoost: 1
      lens_potential_accuracy: 1
      num_massive_neutrinos: 1
      nnu: 3.046
      dark_energy_model: fluid
      
params:
  M:
    prior:
      min: 22
      max: 25
    ref:
      dist: norm
      loc: 23.814
      scale: 0.009
    proposal: 0.005
    latex: \mathcal{M}
  sigv:
    prior:
      min: 25
      max: 375
    ref:
      dist: norm
      loc: 240
      scale: 30
    proposal: 6
    latex: \sigma_v

  gamma0:
    prior:
      min: -1
      max: 3
    ref:
      dist: norm
      loc: 0.55
      scale: 0.2
    proposal: 0.1 # U[-0.1, 0.1]
    latex: \gamma
  gamma1:
    value: 0
  
  sigma8:
    latex: \sigma_8
    min: 0
    max: 2
  
  omegak: # ΩK = −0.0078 ± 0.0058
    prior:
      min: -0.25
      max: 0.25
    ref:
      dist: norm
      loc: -0.0078
      scale: 0.0058
    proposal: 0.0015  # MCMC step size
    latex: \Omega_\mathrm{k}
  
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.04
      scale: 0.014  # 0.014
    proposal: 0.0028 # 0.014/5
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
  ns:
    prior:
      min: 0.91
      max: 1.05
    ref:
      dist: norm
      loc: 0.9681
      scale: 0.0039
    proposal: 0.0008 # 0.0039/5
    latex: n_\mathrm{s}
    
  theta_MC_100:
    prior:
      min: 0.5
      max: 10
    ref:
      dist: norm
      loc: 1.05108
      scale: 0.00026
    proposal: 0.000052
    latex: 100\theta_\mathrm{MC}
    drop: true
    renames: theta
  cosmomc_theta:
    value: 'lambda theta_MC_100: 1.e-2*theta_MC_100'
    derived: false
  H0:
    latex: H_0
    min: 20
    max: 100
  omegabh2:
    prior:
      dist: norm
      loc: 0.02196
      scale: 0.00063
    ref:
      dist: norm
      loc: 0.02196
      scale: 0.00063
    proposal: 0.0000126 # 0.00063/5
    latex: \Omega_\mathrm{b} h^2
  omegach2:
    prior:
      min: 0.001
      max: 0.2
    ref:
      dist: norm
      loc: .1188
      scale: 0.0012 # 
    proposal: 0.00024 # 
    latex: \Omega_\mathrm{c} h^2
  mnu:
    value: 0.06
  tau:
    prior:
      min: 0.02
      max: 0.09
    ref:
      dist: norm
      loc: 0.058
      scale: 0.0062
    proposal: 0.0012 # 0.0062/5
    latex: \tau_\mathrm{reio}
  w:
    value: -1
  wa:
    value: 0
  omegal:
    latex: \Omega_\Lambda
  omegam:
    latex: \Omega_\mathrm{m}
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  omegab:
    derived: 'lambda omegabh2, H0: omegabh2/((H0/100)**2)'
    latex: \Omega_\mathrm{b}
  omegac:
    derived: 'lambda omegach2, H0: omegach2/((H0/100)**2)'
    latex: \Omega_\mathrm{c}
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, omegam: sigma8*omegam**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}
  A:
    derived: 'lambda As: 1e9*As'
    latex: 10^9 A_\mathrm{s}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
  rdrag:
    latex: r_\mathrm{drag}
  yheused:
    latex: Y_P^\mathrm{BBN}
  zstar:
    latex: z_*
  rstar:
    latex: r_*
  thetastar:
    latex: 100\theta_*
  DAstar:
    latex: D_\mathrm{A}/\mathrm{Gpc}
  zdrag:
    latex: z_\mathrm{drag}
  kd:
    latex: k_\mathrm{D}
  thetad:
    latex: 100\theta_\mathrm{D}
  zeq:
    latex: z_\mathrm{eq}
  keq:
    latex: k_\mathrm{eq}
  thetaeq:
    latex: 100\theta_\mathrm{eq}
  thetarseq:
    latex: 100\theta_\mathrm{s,eq}
  DHBBN:
    derived: "lambda DH: 10**5*DH"
    latex: 10^5 \mathrm{D}/\mathrm{H}
  zrei:
    latex: z_\mathrm{re}
  nrun:
    value: 0.0
    latex: n_\mathrm{run}
  nrunrun:
    value: 0.0
    latex: n_\mathrm{run,run}

sampler:
  mcmc:
    # ---------------------------------------------------------------------
    # File (w/ path) or matrix defining a covariance matrix for the proposal:
    # - null (default): will be generated from params info (prior and proposal)
    # - matrix: remember to set `covmat_params` to the parameters in the matrix
    covmat: /share/storage3/bets/camilo_storage3/cmb_gamma/chains/MCMC13.covmat
    covmat_params: ###gamma0 logA theta_MC_100 omegabh2 omegach2 A_planck cal100A cal100B cal143B cal217A cal217B Aradio Adusty AdustT beta_dustT Acib beta_cib Atsz Aksz xi AdustP beta_dustP
    # Proposal covariance matrix learning
    learn_proposal: True
    # Don't learn if convergence better than...
    learn_proposal_Rminus1_min: 0.035
    # Don't learn if convergence is worse than...
    learn_proposal_Rminus1_max: 4.
    # (even earlier if a param is not in the given covariance matrix)
    learn_proposal_Rminus1_max_early: 30.
    # Convergence and stopping
    # Maximum number of posterior evaluations
    max_samples: .inf
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.12
    Rminus1_cl_level: 0.95
    # Exploiting speed hierarchy
    measure_speeds: True
    drag: False
    oversample_power: 0
    oversample_thin: True
    # Avoid chain getting suck forever
    max_tries: 3000
    burn_in: 0
    # When no MPI used, number of fractions of the chain to compare
    Rminus1_single_split: 4
